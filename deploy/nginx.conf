# nginx.conf — Bot Mercadoi
# Coloque em /etc/nginx/sites-available/bot-mercadoi e faça symlink em sites-enabled
# Substitua "seudominio.com.br" pelo seu domínio real

# Cliente A
server {
    listen 80;
    server_name clientea.seudominio.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name clientea.seudominio.com.br;

    ssl_certificate     /etc/letsencrypt/live/clientea.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clientea.seudominio.com.br/privkey.pem;

    client_max_body_size 100M;   # necessário para upload de imagens

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # para operações longas (bot rodando)
        proxy_send_timeout 300s;
    }
}

# Cliente B
server {
    listen 80;
    server_name clienteb.seudominio.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name clienteb.seudominio.com.br;

    ssl_certificate     /etc/letsencrypt/live/clienteb.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clienteb.seudominio.com.br/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
