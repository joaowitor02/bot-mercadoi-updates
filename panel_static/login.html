<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercadoi — Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 500:'#f97316', 600:'#ea580c' } } } } }</script>
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-sm fade-in">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">

      <!-- Header brand -->
      <div class="bg-gradient-to-br from-brand-500 to-brand-600 px-8 py-8 text-center">
        <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-white">Bot Mercadoi</h1>
        <p class="text-white/70 text-sm mt-1">Painel de Operações</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-7">
        <p class="text-sm font-semibold text-slate-700 mb-5 text-center">Digite a senha para acessar</p>
        <form method="POST" action="/login" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">Senha</label>
            <input type="password" name="senha" autofocus autocomplete="current-password"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-shadow"
              placeholder="••••••••" required />
          </div>
          <!--ERRO-->
          <button type="submit"
            class="w-full h-10 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm mt-1">
            Entrar
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">Bot Mercadoi v3.1</p>
  </div>

</body>
</html>
