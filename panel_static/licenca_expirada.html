<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Licença Expirada — Bot Mercadoi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 500:'#f97316', 600:'#ea580c' } } } } }</script>
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .fade-in { animation: fadeIn .35s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-sm fade-in text-center">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">

      <!-- Topo -->
      <div class="bg-gradient-to-br from-red-500 to-red-600 px-8 py-8">
        <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-white">Licença Expirada</h1>
        <p class="text-white/70 text-sm mt-1">Bot Mercadoi</p>
      </div>

      <!-- Corpo -->
      <div class="px-8 py-7 space-y-4">
        <p class="text-sm text-slate-600">
          Sua licença de uso do Bot Mercadoi expirou.<br/>
          Entre em contato para renovar o acesso.
        </p>

        <div class="bg-slate-50 rounded-xl p-4 text-left space-y-2 border border-slate-100">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Suporte</p>
          <p class="text-sm text-slate-700" id="contato-linha">
            <!-- preenchido via JS se disponível -->
            Fale com o responsável pelo sistema.
          </p>
        </div>

        <p class="text-xs text-slate-400">
          Se você é o administrador,
          <a href="/login" class="text-brand-500 hover:underline font-medium">acesse aqui</a>
          com sua senha admin para renovar a licença.
        </p>
      </div>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">Bot Mercadoi v3.1</p>
  </div>

</body>
</html>
